<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuta</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0a0c;
  --bg-surface: #111114;
  --bg-elevated: #18181c;
  --bg-hover: #1f1f24;
  --bg-active: #27272e;
  --border-subtle: rgba(255,255,255,0.06);
  --border-medium: rgba(255,255,255,0.1);
  --border-accent: rgba(200,170,130,0.3);
  --text-primary: #e8e4df;
  --text-secondary: #8a8680;
  --text-muted: #555250;
  --text-accent: #c8aa82;
  --text-bright: #f5f0ea;
  --accent: #c8aa82;
  --accent-dim: rgba(200,170,130,0.15);
  --accent-glow: rgba(200,170,130,0.08);
  --cursed-blue: #4a7dff;
  --cursed-blue-dim: rgba(74,125,255,0.15);
  --cursed-blue-glow: rgba(74,125,255,0.25);
  --rika-purple: #8b5cf6;
  --success: #6ecf8e;
  --warning: #e0b054;
  --error: #e06060;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);font-weight:400;font-size:14px;line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

@keyframes slideUp{to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{to{opacity:1}}
@keyframes accentLineIn{to{opacity:0.6}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes shellFadeIn{to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes playerReveal{0%{clip-path:circle(0% at 50% 50%);opacity:0}20%{opacity:1}100%{clip-path:circle(150% at 50% 50%);opacity:1}}
@keyframes cursedPulse{0%,100%{filter:drop-shadow(0 0 4px var(--cursed-blue-glow))}50%{filter:drop-shadow(0 0 12px var(--cursed-blue-glow))}}
@keyframes rikaFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes rikaParticle{0%{opacity:0;transform:translateY(0) scale(0)}20%{opacity:.5;transform:translateY(-20px) scale(1)}80%{opacity:.2;transform:translateY(-80px) scale(.5)}100%{opacity:0;transform:translateY(-120px) scale(0)}}

/* ═══ SETUP ═══ */
.setup-screen{display:flex;height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:40px;background:var(--bg-deep);text-align:center;position:relative}
.setup-screen::before{content:'';position:absolute;top:-100px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);pointer-events:none}
.setup-screen.hidden{display:none}
.setup-logo{font-family:var(--font-display);font-size:42px;font-weight:500;color:var(--text-bright);margin-bottom:4px;opacity:0;transform:translateY(20px);animation:slideUp .8s var(--ease-out-expo) .2s forwards}
.setup-subtitle{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;opacity:0;animation:fadeIn .6s var(--ease-out-expo) .4s forwards}
.setup-tagline{font-size:15px;color:var(--text-secondary);font-weight:300;margin-bottom:48px;opacity:0;animation:fadeIn .6s var(--ease-out-expo) .5s forwards}
.setup-card{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:32px;width:100%;max-width:420px;text-align:left;opacity:0;transform:translateY(16px);animation:slideUp .6s var(--ease-out-expo) .6s forwards}
.setup-step{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px}
.setup-heading{font-family:var(--font-display);font-size:20px;font-weight:500;color:var(--text-bright);margin-bottom:20px}
.input-group{margin-bottom:16px}
.input-label{font-size:12px;color:var(--text-secondary);margin-bottom:6px;display:block}
.input-field{width:100%;padding:10px 14px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-mono);font-size:13px;outline:none;transition:border-color .2s}
.input-field:focus{border-color:var(--accent)}
.input-field::placeholder{color:var(--text-muted)}
.setup-error{font-family:var(--font-mono);font-size:11px;color:var(--error);margin-top:12px;min-height:16px}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);opacity:0;transition:opacity .25s}
.btn:hover::after{opacity:1}
.btn-primary{background:var(--accent);color:var(--bg-deep)}
.btn-primary:hover{box-shadow:0 4px 20px rgba(200,170,130,.25);transform:translateY(-1px)}
.btn-secondary{background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border-subtle)}
.btn-secondary:hover{border-color:var(--border-medium);color:var(--text-primary)}

/* ═══ APP SHELL ═══ */
.app-shell{display:none;grid-template-columns:260px 1fr;grid-template-rows:1fr;height:100vh;opacity:0;animation:shellFadeIn .8s var(--ease-out-expo) .1s forwards}
.app-shell.active{display:grid}

/* ═══ SIDEBAR ═══ */
.sidebar{background:var(--bg-surface);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;position:relative;overflow:hidden}
.sidebar::after{content:'';position:absolute;top:60px;right:0;width:1px;height:120px;background:linear-gradient(180deg,transparent,var(--accent),transparent);opacity:0;animation:accentLineIn 1.2s var(--ease-out-expo) .6s forwards}
.sidebar-header{padding:28px 24px 24px}
.logo{display:flex;align-items:baseline;opacity:0;transform:translateY(8px);animation:slideUp .6s var(--ease-out-expo) .2s forwards}
.logo-text{font-family:var(--font-display);font-size:26px;font-weight:500;letter-spacing:-.02em;color:var(--text-bright)}
.logo-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;display:inline-block;margin-left:2px;margin-bottom:2px}
.version-tag{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-left:10px;letter-spacing:.05em;opacity:0;animation:fadeIn .5s var(--ease-out-expo) .8s forwards}
.sidebar-mark{padding:0 24px;margin-bottom:12px;opacity:0;animation:fadeIn .8s var(--ease-out-expo) 1.2s forwards}
.sidebar-mark svg{width:100%;height:16px;opacity:.15}
.status-bar{display:flex;align-items:center;gap:8px;padding:12px 24px;margin:0 0 8px;opacity:0;transform:translateY(6px);animation:slideUp .5s var(--ease-out-expo) .35s forwards}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
.status-dot.connected{background:var(--success);box-shadow:0 0 8px rgba(110,207,142,.4);animation:pulse 3s ease-in-out infinite}
.status-text{font-size:12px;color:var(--text-secondary)}
.sidebar-search{padding:0 16px;margin-bottom:8px;opacity:0;animation:fadeIn .5s var(--ease-out-expo) .4s forwards}
.sidebar-search-wrap{position:relative}
.sidebar-search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-muted)}
.sidebar-search input{width:100%;padding:9px 12px 9px 34px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-body);font-size:12px;outline:none;transition:border-color .2s}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-search input::placeholder{color:var(--text-muted)}
.nav-section{padding:8px 12px;flex:1;overflow-y:auto}
.nav-section::-webkit-scrollbar{width:4px}
.nav-section::-webkit-scrollbar-track{background:transparent}
.nav-section::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:2px}
.nav-label{font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);padding:16px 12px 8px;opacity:0;animation:fadeIn .5s var(--ease-out-expo) .5s forwards}
.nav-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;position:relative;color:var(--text-secondary);font-size:13px}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{background:var(--accent-dim);color:var(--text-accent)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-icon{width:18px;height:18px;opacity:.6;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.sidebar-footer{padding:16px 24px;border-top:1px solid var(--border-subtle);opacity:0;animation:fadeIn .5s var(--ease-out-expo) .9s forwards}
.server-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:100px;background:var(--bg-elevated);border:1px solid var(--border-subtle);font-family:var(--font-mono);font-size:10px;color:var(--text-muted);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.server-badge-dot{width:5px;height:5px;border-radius:50%;background:var(--success);flex-shrink:0}

/* ═══ MAIN ═══ */
.main{display:flex;flex-direction:column;overflow:hidden;position:relative}
.main::before{content:'';position:absolute;top:-100px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);pointer-events:none;z-index:0}
.hero{position:relative;height:380px;overflow:hidden;flex-shrink:0;cursor:pointer}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;transition:transform 6s ease-out}
.hero:hover .hero-bg{transform:scale(1.02)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(0deg,var(--bg-deep) 0%,rgba(10,10,12,.5) 40%,rgba(10,10,12,.3) 60%,rgba(10,10,12,.7) 100%)}
.hero-content{position:absolute;bottom:36px;left:40px;right:40px;max-width:600px;z-index:1;opacity:0;transform:translateY(16px);animation:slideUp .7s var(--ease-out-expo) .4s forwards}
.hero-tag{display:inline-block;padding:3px 10px;background:var(--accent-dim);border:1px solid var(--border-accent);color:var(--text-accent);font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;border-radius:var(--radius-sm);margin-bottom:12px}
.hero-title{font-family:var(--font-display);font-size:36px;font-weight:500;color:var(--text-bright);letter-spacing:-.02em;line-height:1.15;margin-bottom:10px}
.hero-title em{font-style:italic;color:var(--text-accent)}
.hero-meta{display:flex;gap:12px;align-items:center;color:var(--text-secondary);margin-bottom:12px;font-family:var(--font-mono);font-size:11px}
.hero-meta .sep{width:3px;height:3px;border-radius:50%;background:var(--text-muted)}
.hero-desc{color:var(--text-secondary);font-size:13px;line-height:1.7;font-weight:300;max-width:480px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hero-actions{display:flex;gap:10px;margin-top:16px}
.hero-actions .btn svg{width:14px;height:14px}
.content{flex:1;overflow-y:auto;padding:28px 40px 40px;position:relative;z-index:1}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:3px}
.media-section{margin-bottom:32px}
.section-header{display:flex;align-items:baseline;gap:14px;margin-bottom:14px}
.section-title{font-family:var(--font-display);font-size:18px;font-weight:500;color:var(--text-bright);white-space:nowrap}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border-subtle),transparent)}
.media-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;scrollbar-width:none}
.media-row::-webkit-scrollbar{display:none}
.media-card{flex:0 0 160px;scroll-snap-align:start;cursor:pointer;position:relative;border-radius:var(--radius-md);overflow:hidden;aspect-ratio:2/3;background:var(--bg-surface);border:1px solid var(--border-subtle);transition:all .3s var(--ease-out-quart)}
.media-card:hover{transform:translateY(-6px);border-color:var(--border-accent);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.media-card img{width:100%;height:100%;object-fit:cover}
.card-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(10,10,12,.9) 0%,rgba(10,10,12,0) 50%);opacity:0;transition:opacity .3s;display:flex;flex-direction:column;justify-content:flex-end;padding:14px}
.media-card:hover .card-overlay{opacity:1}
.card-title{font-family:var(--font-display);font-size:14px;font-weight:500;color:var(--text-bright);line-height:1.2}
.card-year{font-family:var(--font-mono);font-size:10px;color:var(--text-accent);margin-top:3px}
.card-play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:40px;height:40px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .3s var(--ease-out-expo);box-shadow:0 4px 20px rgba(200,170,130,.3)}
.media-card:hover .card-play-icon{transform:translate(-50%,-50%) scale(1)}
.card-play-icon svg{width:16px;height:16px;color:var(--bg-deep);margin-left:2px}

/* ═══ DETAIL MODAL ═══ */
.detail-modal{position:fixed;inset:0;z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:all .4s}
.detail-modal.open{opacity:1;visibility:visible}
.detail-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.detail-sheet{position:relative;width:100%;max-width:860px;max-height:85vh;background:var(--bg-surface);border:1px solid var(--border-subtle);border-bottom:none;border-radius:var(--radius-lg) var(--radius-lg) 0 0;overflow-y:auto;transform:translateY(100%);transition:transform .5s var(--ease-out-expo)}
.detail-sheet::-webkit-scrollbar{width:6px}
.detail-sheet::-webkit-scrollbar-track{background:transparent}
.detail-sheet::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:3px}
.detail-modal.open .detail-sheet{transform:translateY(0)}
.detail-banner{height:340px;position:relative;overflow:hidden}
.detail-banner img{width:100%;height:100%;object-fit:cover}
.detail-banner-overlay{position:absolute;inset:0;background:linear-gradient(0deg,var(--bg-surface) 0%,transparent 60%)}
.detail-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:var(--radius-sm);background:rgba(10,10,12,.7);border:1px solid var(--border-subtle);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s;z-index:2}
.detail-close:hover{background:var(--accent-dim);border-color:var(--border-accent);color:var(--text-accent)}
.detail-body{padding:0 36px 36px;margin-top:-50px;position:relative}
.detail-body h2{font-family:var(--font-display);font-size:32px;font-weight:500;color:var(--text-bright);letter-spacing:-.02em;line-height:1.15}
.detail-meta{display:flex;gap:12px;align-items:center;margin:10px 0 16px;color:var(--text-secondary);font-family:var(--font-mono);font-size:11px}
.detail-genres{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.genre-tag{padding:4px 10px;border:1px solid var(--border-subtle);border-radius:100px;font-size:11px;font-family:var(--font-mono);color:var(--text-muted)}
.detail-desc{color:var(--text-secondary);font-size:13px;line-height:1.8;font-weight:300;max-width:560px}
.episodes-section{margin-top:28px}
.episodes-header{font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px}
.season-select{padding:6px 12px;background:var(--bg-elevated);border:1px solid var(--border-subtle);color:var(--text-primary);font-family:var(--font-mono);font-size:11px;border-radius:var(--radius-sm);outline:none;cursor:pointer;margin-bottom:14px}
.episode-list{display:flex;flex-direction:column;gap:2px}
.episode-item{display:flex;align-items:center;gap:14px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .2s}
.episode-item:hover{background:var(--bg-hover)}
.ep-num{font-family:var(--font-display);font-size:18px;color:var(--text-muted);width:32px;text-align:center;flex-shrink:0}
.ep-thumb{width:100px;height:56px;border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0;background:var(--bg-elevated)}
.ep-thumb img{width:100%;height:100%;object-fit:cover}
.ep-info{flex:1;min-width:0}
.ep-info h4{font-size:13px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-info p{font-size:11px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-duration{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);flex-shrink:0}

/* ═══ VIDEO PLAYER ═══ */
.player-container{position:fixed;inset:0;z-index:2000;background:#000;opacity:0;visibility:hidden;transition:opacity .4s}
.player-container.active{opacity:1;visibility:visible}
.player-container.entering{animation:playerReveal 1s var(--ease-out-expo) forwards}
video{width:100%;height:100%;object-fit:contain;background:#000}

/* Rika particles — reduced count for perf */
.player-rika-ambient{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.rika-particle{position:absolute;width:2px;height:2px;background:var(--cursed-blue);border-radius:50%;box-shadow:0 0 4px var(--cursed-blue-glow);opacity:0;animation:rikaParticle var(--dur) var(--delay) ease-in-out infinite}

/* Loading overlay */
.player-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.6);opacity:0;visibility:hidden;transition:all .3s;z-index:5;pointer-events:none}
.player-loading.active{opacity:1;visibility:visible}
.player-loading .loading-spinner{width:36px;height:36px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.player-loading-text{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:12px;letter-spacing:.08em}

/* Top bar */
.player-top{position:absolute;top:0;left:0;right:0;padding:28px 36px;display:flex;align-items:flex-start;justify-content:space-between;opacity:0;transition:opacity .4s;background:linear-gradient(180deg,rgba(0,0,0,.7) 0%,transparent 100%);pointer-events:none}
.player-container:hover .player-top,.player-container.show-controls .player-top{opacity:1;pointer-events:auto}
.player-top-left{display:flex;flex-direction:column;gap:6px}
.player-back{display:flex;align-items:center;gap:8px;cursor:pointer;color:rgba(255,255,255,.5);transition:color .2s;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.player-back:hover{color:var(--accent)}
.player-back svg{width:16px;height:16px}
.player-now-playing{margin-top:8px}
.player-series-name{font-family:var(--font-mono);font-size:10px;color:var(--cursed-blue);letter-spacing:.1em;text-transform:uppercase}
.player-ep-title{font-family:var(--font-display);font-size:22px;font-weight:500;color:var(--text-bright);font-style:italic;margin-top:2px}
.player-cursed-ring{width:48px;height:48px;opacity:.3;animation:cursedPulse 4s ease-in-out infinite,rikaFloat 8s ease-in-out infinite}

/* Bottom controls */
.player-controls{position:absolute;bottom:0;left:0;right:0;opacity:0;transform:translateY(12px);transition:all .4s var(--ease-out-expo);pointer-events:none;background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,rgba(0,0,0,.4) 60%,transparent 100%);padding:80px 0 0}
.player-container:hover .player-controls,.player-container.show-controls .player-controls{opacity:1;transform:translateY(0);pointer-events:auto}

.progress-area{padding:0 36px;margin-bottom:16px;position:relative}
.progress-wrap{position:relative;width:100%;height:4px;background:rgba(255,255,255,.07);border-radius:2px;cursor:pointer;transition:height .15s}
.progress-wrap:hover{height:7px}
.progress-buffer{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.05);border-radius:2px;pointer-events:none}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--cursed-blue));border-radius:2px;position:relative;will-change:width}
.progress-bar::after{content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%) scale(0);width:14px;height:14px;background:var(--text-bright);border-radius:50%;box-shadow:0 0 12px var(--cursed-blue-glow);transition:transform .15s}
.progress-wrap:hover .progress-bar::after{transform:translateY(-50%) scale(1)}
.progress-tooltip{position:absolute;top:-32px;transform:translateX(-50%);padding:3px 8px;background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:4px;font-family:var(--font-mono);font-size:10px;color:var(--text-primary);pointer-events:none;opacity:0;transition:opacity .15s;white-space:nowrap}
.progress-wrap:hover .progress-tooltip{opacity:1}

.controls-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 36px 24px}
.ctrl-left{display:flex;align-items:center;gap:14px}
.time-display{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.35)}
.time-display .time-current{color:var(--text-bright)}
.ctrl-center{display:flex;align-items:center;gap:6px;justify-content:center}
.ctrl-btn{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:8px;border-radius:var(--radius-sm);transition:all .2s;display:flex;align-items:center;justify-content:center;position:relative}
.ctrl-btn:hover{color:#fff;background:rgba(255,255,255,.06)}
.ctrl-btn svg{width:20px;height:20px}
.ctrl-btn.play-pause{width:52px;height:52px;background:var(--accent);color:var(--bg-deep);border-radius:50%;box-shadow:0 4px 24px rgba(200,170,130,.3);transition:all .25s;margin:0 8px}
.ctrl-btn.play-pause:hover{transform:scale(1.08);box-shadow:0 6px 30px rgba(200,170,130,.5)}
.ctrl-btn.play-pause svg{width:24px;height:24px}
.skip-label{position:absolute;font-family:var(--font-mono);font-size:8px;color:rgba(255,255,255,.3);bottom:0}
.ctrl-right{display:flex;align-items:center;gap:4px;justify-content:flex-end}

/* Liquid Volume */
.volume-group{display:flex;align-items:center;position:relative}
.volume-btn{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:8px;display:flex;align-items:center;justify-content:center;transition:color .2s;border-radius:var(--radius-sm)}
.volume-btn:hover{color:var(--accent)}
.volume-btn svg{width:18px;height:18px}
.liquid-volume-wrap{width:90px;height:28px;cursor:pointer;position:relative}
.liquid-volume-canvas{width:100%;height:100%;display:block}

/* Panel buttons */
.panel-btn{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;padding:7px 10px;border-radius:var(--radius-sm);transition:all .2s;display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10px}
.panel-btn:hover{color:var(--accent);background:var(--accent-dim)}
.panel-btn svg{width:16px;height:16px}
.panel-divider{width:1px;height:20px;background:rgba(255,255,255,.06);margin:0 4px}

/* Settings panels */
.settings-panel{position:absolute;bottom:68px;right:36px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:6px;min-width:220px;opacity:0;visibility:hidden;transform:translateY(8px);transition:all .25s var(--ease-out-expo);z-index:10;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.settings-panel.open{opacity:1;visibility:visible;transform:translateY(0)}
.panel-header{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);padding:8px 12px 6px}
.panel-option{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;color:var(--text-secondary);font-size:12px}
.panel-option:hover{background:var(--bg-hover);color:var(--text-primary)}
.panel-option.selected{color:var(--text-accent);background:var(--accent-dim)}
.panel-option.selected::before{content:'';width:4px;height:4px;background:var(--accent);border-radius:50%;flex-shrink:0}
.panel-option .opt-label{flex:1}
.panel-option .opt-meta{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
.fullscreen-btn{margin-left:8px}

/* ═══ LOADING ═══ */
.loading-overlay{position:fixed;inset:0;z-index:3000;background:var(--bg-deep);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-text{margin-top:14px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text-muted);font-size:13px;text-align:center}

@media(max-width:768px){
  .app-shell.active{grid-template-columns:1fr}
  .sidebar{display:none}
  .hero{height:280px}
  .hero-title{font-size:24px!important}
  .hero-content{left:20px;right:20px;bottom:24px}
  .content{padding:20px}
  .media-card{flex:0 0 120px}
  .controls-grid{padding:0 16px 16px}
  .progress-area{padding:0 16px}
  .player-top{padding:16px 20px}
  .detail-body{padding:0 20px 20px}
  .settings-panel{right:16px;bottom:56px}
}
</style>
</head>
<body>

<div class="setup-screen" id="setupScreen">
  <div class="setup-logo">Yuta<span style="color:var(--accent);">.</span></div>
  <div class="setup-subtitle">純愛だよ — It's pure love</div>
  <div class="setup-tagline">Connect your Jellyfin server</div>
  <div class="setup-card">
    <div class="setup-step">Connection</div>
    <div class="setup-heading">Server details</div>
    <div class="input-group"><label class="input-label">Server URL</label><input class="input-field" type="text" id="serverUrl" placeholder="http://192.168.1.100:8096"></div>
    <div class="input-group"><label class="input-label">Username</label><input class="input-field" type="text" id="username" placeholder="your username"></div>
    <div class="input-group"><label class="input-label">Password</label><input class="input-field" type="password" id="password" placeholder="••••••••"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" id="btnConnect">Connect →</button>
    <div class="setup-error" id="setupError"></div>
  </div>
</div>

<div class="loading-overlay hidden" id="loadingOverlay">
  <div class="loading-spinner" style="width:32px;height:32px;border:2px solid var(--bg-active);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>
  <div class="loading-text">Loading library</div>
</div>

<div class="app-shell" id="appShell">
  <aside class="sidebar">
    <div class="sidebar-header"><div class="logo"><span class="logo-text">Yuta</span><span class="logo-dot"></span><span class="version-tag">v1.0</span></div></div>
    <div class="sidebar-mark"><svg viewBox="0 0 200 10" fill="none"><line x1="0" y1="5" x2="140" y2="5" stroke="url(#kg)" stroke-width="1"/><circle cx="145" cy="5" r="2" fill="#c8aa82"/><line x1="150" y1="5" x2="200" y2="5" stroke="rgba(200,170,130,0.15)" stroke-width=".5" stroke-dasharray="3 3"/><defs><linearGradient id="kg" x1="0" y1="0" x2="140" y2="0"><stop offset="0%" stop-color="transparent"/><stop offset="40%" stop-color="#c8aa82" stop-opacity=".6"/><stop offset="100%" stop-color="#c8aa82" stop-opacity=".1"/></linearGradient></defs></svg></div>
    <div class="status-bar"><div class="status-dot connected"></div><span class="status-text">Connected</span></div>
    <div class="sidebar-search"><div class="sidebar-search-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" id="searchInput" placeholder="Search library..."></div></div>
    <nav class="nav-section" id="navSection"><div class="nav-label">Library</div><div class="nav-item active" onclick="filterNav(null,this)"><svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="6" height="6" rx="1"/><rect x="10" y="2" width="6" height="6" rx="1"/><rect x="2" y="10" width="6" height="6" rx="1"/><rect x="10" y="10" width="6" height="6" rx="1"/></svg>All Items</div></nav>
    <div class="sidebar-footer"><div class="server-badge"><span class="server-badge-dot"></span><span id="serverLabel">Jellyfin</span></div></div>
  </aside>
  <main class="main">
    <section class="hero" id="hero"></section>
    <div class="content" id="mainContent"></div>
  </main>
</div>

<div class="detail-modal" id="detailModal"><div class="detail-backdrop" onclick="closeDetail()"></div><div class="detail-sheet" id="detailSheet"></div></div>

<!-- VIDEO PLAYER -->
<div class="player-container" id="playerContainer">
  <video id="videoPlayer" preload="auto" playsinline></video>
  <div class="player-rika-ambient" id="rikaAmbient"></div>
  <div class="player-loading" id="playerLoading"><div class="loading-spinner"></div><div class="player-loading-text">Loading stream...</div></div>
  <div class="player-top">
    <div class="player-top-left">
      <div class="player-back" onclick="closePlayer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>Back</div>
      <div class="player-now-playing"><div class="player-series-name" id="playerSeriesName"></div><div class="player-ep-title" id="playerEpTitle"></div></div>
    </div>
    <svg class="player-cursed-ring" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="url(#crg)" stroke-width="1.5" stroke-dasharray="4 6" opacity=".6"/><circle cx="24" cy="24" r="14" stroke="var(--cursed-blue)" stroke-width=".5" opacity=".3"/><circle cx="24" cy="24" r="3" fill="var(--cursed-blue)" opacity=".5"/><defs><linearGradient id="crg"><stop offset="0%" stop-color="var(--cursed-blue)"/><stop offset="100%" stop-color="var(--rika-purple)"/></linearGradient></defs></svg>
  </div>
  <div class="player-controls">
    <div class="progress-area"><div class="progress-wrap" id="progressWrap"><div class="progress-buffer" id="progressBuffer"></div><div class="progress-bar" id="progressBar"></div><div class="progress-tooltip" id="progressTooltip">00:00</div></div></div>
    <div class="controls-grid">
      <div class="ctrl-left"><div class="time-display"><span class="time-current" id="timeCurrent">00:00</span> / <span id="timeDuration">00:00</span></div></div>
      <div class="ctrl-center">
        <button class="ctrl-btn" onclick="skip(-10)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2.5 2v6h6"/><path d="M2.6 8A9 9 0 1 1 3 12.5"/></svg><span class="skip-label">10</span></button>
        <button class="ctrl-btn play-pause" id="btnPlayPause" onclick="togglePlay()"><svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><polygon points="7,3 21,12 7,21"/></svg><svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg></button>
        <button class="ctrl-btn" onclick="skip(30)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6"/><path d="M21.4 8A9 9 0 1 0 21 12.5"/></svg><span class="skip-label">30</span></button>
      </div>
      <div class="ctrl-right">
        <div class="volume-group">
          <button class="volume-btn" onclick="toggleMute()"><svg id="volIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19" fill="currentColor"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></button>
          <div class="liquid-volume-wrap" id="liquidVolumeWrap"><canvas class="liquid-volume-canvas" id="liquidVolumeCanvas" width="180" height="56"></canvas></div>
        </div>
        <div class="panel-divider"></div>
        <button class="panel-btn" onclick="togglePanel('audio')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3" fill="currentColor"/><circle cx="18" cy="16" r="3" fill="currentColor"/></svg><span id="audioTrackLabel">Audio</span></button>
        <button class="panel-btn" onclick="togglePanel('subs')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 12h4M14 12h4M8 16h8"/></svg>Subs</button>
        <button class="panel-btn" onclick="togglePanel('quality')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20v-6M6 20V10M18 20v-4"/></svg><span id="qualityLabel">Auto</span></button>
        <div class="panel-divider"></div>
        <button class="ctrl-btn fullscreen-btn" onclick="toggleFullscreen()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>
      </div>
    </div>
  </div>
  <div class="settings-panel" id="panelAudio"><div class="panel-header">Audio Track</div><div id="audioTrackList"></div></div>
  <div class="settings-panel" id="panelSubs"><div class="panel-header">Subtitles</div><div id="subTrackList"></div></div>
  <div class="settings-panel" id="panelQuality"><div class="panel-header">Quality</div><div id="qualityList"></div></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   YUTA v1.0 — Jellyfin Client (Final Build)
   ═══════════════════════════════════════════════════════════════════ */

let SERVER='',API_KEY='',USER_ID='';
let allItems=[],libraries=[];
let currentPlayId=null, currentMediaSources=[];
let currentAudioIndex=-1, currentSubIndex=-1, currentQuality='auto';
let volume=1, isMuted=false;

// ─── SETUP ───
document.getElementById('btnConnect').addEventListener('click',connect);
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')connect()});

async function connect(){
  const url=document.getElementById('serverUrl').value.trim().replace(/\/$/,'');
  const user=document.getElementById('username').value.trim();
  const pass=document.getElementById('password').value;
  const err=document.getElementById('setupError');
  if(!url){err.textContent='Enter your server URL';return}
  if(!user){err.textContent='Enter username';return}
  err.textContent='Connecting...';
  try{
    const r=await fetch(url+'/Users/AuthenticateByName',{method:'POST',headers:{'Content-Type':'application/json','X-Emby-Authorization':'MediaBrowser Client="Yuta",Device="Browser",DeviceId="yuta-'+Date.now()+'",Version="1.0.0"'},body:JSON.stringify({Username:user,Pw:pass})});
    if(!r.ok)throw 0;
    const d=await r.json();
    SERVER=url;API_KEY=d.AccessToken;USER_ID=d.User.Id;
    document.getElementById('serverLabel').textContent=url.replace(/^https?:\/\//,'').split('/')[0];
    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('loadingOverlay').classList.remove('hidden');
    await loadLibrary();
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('appShell').classList.add('active');
    setTimeout(()=>document.getElementById('loadingOverlay').style.display='none',600);
  }catch(e){err.textContent='Connection failed — check URL and credentials'}
}

function jfetch(p){return fetch(SERVER+p,{headers:{'X-Emby-Token':API_KEY}}).then(r=>r.json())}
function imgUrl(id,t,w){return SERVER+'/Items/'+id+'/Images/'+(t||'Primary')+'?maxWidth='+(w||600)+'&quality=90&api_key='+API_KEY}

// ─── LIBRARY ───
async function loadLibrary(){
  const v=await jfetch('/Users/'+USER_ID+'/Views');
  libraries=v.Items||[];
  const nav=document.getElementById('navSection');
  libraries.forEach(lib=>{const el=document.createElement('div');el.className='nav-item';el.onclick=function(){filterNav(lib.Id,this)};el.innerHTML='<svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h12M3 9h8M3 14h10"/></svg>'+lib.Name;nav.appendChild(el)});
  const ir=await jfetch('/Users/'+USER_ID+'/Items?Recursive=true&IncludeItemTypes=Series,Movie&SortBy=SortName&SortOrder=Ascending&Fields=Overview,Genres,CommunityRating,ProductionYear,RunTimeTicks,DateCreated&EnableImageTypes=Primary,Backdrop&Limit=200');
  allItems=ir.Items||[];
  renderApp(allItems);
}
function filterNav(pid,el){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active');if(!pid){renderApp(allItems);return}jfetch('/Users/'+USER_ID+'/Items?ParentId='+pid+'&Recursive=true&IncludeItemTypes=Series,Movie&SortBy=SortName&SortOrder=Ascending&Fields=Overview,Genres,CommunityRating,ProductionYear,RunTimeTicks,DateCreated&Limit=200').then(r=>renderApp(r.Items||[]))}
let st;document.getElementById('searchInput').addEventListener('input',e=>{clearTimeout(st);st=setTimeout(()=>{const q=e.target.value.trim().toLowerCase();renderApp(q?allItems.filter(i=>(i.Name||'').toLowerCase().includes(q)):allItems)},300)});

// ─── RENDER ───
function renderApp(items){
  if(!items.length){document.getElementById('hero').innerHTML='';document.getElementById('mainContent').innerHTML='<div class="empty-state">Nothing found</div>';return}
  const wb=items.filter(i=>i.BackdropImageTags&&i.BackdropImageTags.length);
  const hi=wb.length?wb[Math.floor(Math.random()*wb.length)]:items[0];
  const hImg=hi.BackdropImageTags&&hi.BackdropImageTags.length?imgUrl(hi.Id,'Backdrop',1920):imgUrl(hi.Id,'Primary',1200);
  document.getElementById('hero').innerHTML='<div class="hero-bg" style="background-image:url(\''+hImg+'\')"></div><div class="hero-overlay"></div><div class="hero-content"><div class="hero-tag">'+(hi.Type==='Series'?'Series':'Film')+'</div><div class="hero-title">'+(hi.Name||'')+'<em>.</em></div><div class="hero-meta">'+(hi.ProductionYear?'<span>'+hi.ProductionYear+'</span><span class="sep"></span>':'')+(hi.CommunityRating?'<span>★ '+hi.CommunityRating.toFixed(1)+'</span><span class="sep"></span>':'')+(hi.Genres&&hi.Genres.length?'<span>'+hi.Genres.slice(0,3).join(' · ')+'</span>':'')+'</div><div class="hero-desc">'+(hi.Overview||'')+'</div><div class="hero-actions"><button class="btn btn-primary" onclick="event.stopPropagation();playItem(\''+hi.Id+'\',\''+hi.Type+'\')"><svg viewBox="0 0 18 18" fill="currentColor"><polygon points="5,3 15,9 5,15"/></svg>Play</button><button class="btn btn-secondary" onclick="event.stopPropagation();openDetail(\''+hi.Id+'\')">More Info</button></div></div>';
  document.getElementById('hero').onclick=function(){openDetail(hi.Id)};
  const gm={};items.forEach(it=>{(it.Genres||['Uncategorized']).forEach(g=>{if(!gm[g])gm[g]=[];if(!gm[g].find(x=>x.Id===it.Id))gm[g].push(it)})});
  const recent=[...items].sort((a,b)=>new Date(b.DateCreated||0)-new Date(a.DateCreated||0)).slice(0,20);
  let html=renderRow('Recently added',recent);
  Object.entries(gm).sort((a,b)=>b[1].length-a[1].length).slice(0,10).forEach(([g,gi])=>{html+=renderRow(g,gi)});
  document.getElementById('mainContent').innerHTML=html;
}
function renderRow(title,items){let c='';items.forEach(i=>{c+='<div class="media-card" onclick="openDetail(\''+i.Id+'\')"><img src="'+imgUrl(i.Id,'Primary',300)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'"><div class="card-overlay"><div class="card-title">'+(i.Name||'')+'</div><div class="card-year">'+(i.ProductionYear||'')+'</div></div><div class="card-play-icon" onclick="event.stopPropagation();playItem(\''+i.Id+'\',\''+i.Type+'\')"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="9,4 20,12 9,20"/></svg></div></div>'});return '<div class="media-section"><div class="section-header"><h2 class="section-title">'+title+'</h2><div class="section-line"></div></div><div class="media-row">'+c+'</div></div>'}

// ─── DETAIL ───
async function openDetail(id){
  const item=await jfetch('/Users/'+USER_ID+'/Items/'+id+'?Fields=Overview,Genres,CommunityRating,ProductionYear,RunTimeTicks,Studios');
  const sheet=document.getElementById('detailSheet');
  const bImg=item.BackdropImageTags&&item.BackdropImageTags.length?imgUrl(item.Id,'Backdrop',1200):imgUrl(item.Id,'Primary',800);
  const rt=item.RunTimeTicks?Math.round(item.RunTimeTicks/600000000)+'m':'';
  let ep='';
  if(item.Type==='Series'){try{const ss=await jfetch('/Shows/'+item.Id+'/Seasons?UserId='+USER_ID);if(ss.Items&&ss.Items.length){const eps=await jfetch('/Shows/'+item.Id+'/Episodes?SeasonId='+ss.Items[0].Id+'&UserId='+USER_ID+'&Fields=Overview,RunTimeTicks');let opts='';ss.Items.forEach(s=>{opts+='<option value="'+s.Id+'">'+s.Name+'</option>'});ep='<div class="episodes-section"><div class="episodes-header">Episodes</div><select class="season-select" onchange="loadSeason(\''+item.Id+'\',this.value)">'+opts+'</select><div class="episode-list" id="episodeList">'+renderEps(eps.Items||[])+'</div></div>';}}catch(e){}}
  let gs='';(item.Genres||[]).forEach(g=>{gs+='<span class="genre-tag">'+g+'</span>'});
  sheet.innerHTML='<div class="detail-banner"><img src="'+bImg+'" onerror="this.style.display=\'none\'"><div class="detail-banner-overlay"></div></div><button class="detail-close" onclick="closeDetail()">✕</button><div class="detail-body"><h2>'+(item.Name||'')+'</h2><div class="detail-meta">'+(item.ProductionYear?'<span>'+item.ProductionYear+'</span>':'')+(item.CommunityRating?'<span>★ '+item.CommunityRating.toFixed(1)+'</span>':'')+(rt?'<span>'+rt+'</span>':'')+'</div><div class="detail-genres">'+gs+'</div><button class="btn btn-primary" onclick="playItem(\''+item.Id+'\',\''+item.Type+'\')" style="margin-bottom:20px"><svg viewBox="0 0 18 18" fill="currentColor"><polygon points="5,3 15,9 5,15"/></svg>Play</button><p class="detail-desc">'+(item.Overview||'')+'</p>'+ep+'</div>';
  document.getElementById('detailModal').classList.add('open');document.body.style.overflow='hidden';
}
function renderEps(eps){let h='';eps.forEach((e,i)=>{const d=e.RunTimeTicks?Math.round(e.RunTimeTicks/600000000)+'m':'';h+='<div class="episode-item" onclick="playItem(\''+e.Id+'\',\'Episode\')"><div class="ep-num">'+(e.IndexNumber||i+1)+'</div><div class="ep-thumb"><img src="'+imgUrl(e.Id,'Primary',200)+'" onerror="this.parentElement.style.background=\'var(--bg-elevated)\'"></div><div class="ep-info"><h4>'+(e.Name||'Episode '+(i+1))+'</h4><p>'+(e.Overview||'').substring(0,80)+'</p></div><div class="ep-duration">'+d+'</div></div>'});return h}
async function loadSeason(sid,ssid){const eps=await jfetch('/Shows/'+sid+'/Episodes?SeasonId='+ssid+'&UserId='+USER_ID+'&Fields=Overview,RunTimeTicks');document.getElementById('episodeList').innerHTML=renderEps(eps.Items||[])}
function closeDetail(){document.getElementById('detailModal').classList.remove('open');document.body.style.overflow=''}


/* ═══════════════════════════════════════════════════════════════════
   VIDEO PLAYER ENGINE — Complete Rewrite
   
   Architecture:
   1. Initial play: Try direct stream (Static=true) first — fast, no server load
   2. If direct fails: Automatically retry with transcoding (Static=false, h264+aac)
   3. Track changes: ALWAYS use transcoding — only way Jellyfin honors track params
   4. Seek-after-source-change: Wait for loadedmetadata, THEN seek, THEN play
   5. Liquid volume only animates when player is visible
   ═══════════════════════════════════════════════════════════════════ */

const video = document.getElementById('videoPlayer');
const pc = document.getElementById('playerContainer');
const playerLoading = document.getElementById('playerLoading');
let isPlaying = false, controlsTimeout, rafId = null, liquidRafId = null;
let playerActive = false; // controls liquid animation lifecycle

// Rika particles (8 instead of 15 for performance)
(function(){
  const amb = document.getElementById('rikaAmbient');
  for(let i = 0; i < 8; i++){
    const p = document.createElement('div');
    p.className = 'rika-particle';
    p.style.cssText = 'left:'+Math.random()*100+'%;bottom:'+Math.random()*30+'%;--dur:'+(5+Math.random()*5)+'s;--delay:'+Math.random()*8+'s';
    amb.appendChild(p);
  }
})();

function showLoading(show) {
  playerLoading.classList.toggle('active', show);
}

/* ── Build stream URL ── */
function buildStreamUrl(playId, opts) {
  opts = opts || {};
  const params = new URLSearchParams();
  params.set('api_key', API_KEY);

  // Determine if we need transcoding
  // Transcoding required when: switching tracks, changing quality, or fallback mode
  const needsTranscode = opts.forceTranscode || opts.audioIndex >= 0 || opts.subtitleIndex >= 0 || (opts.quality && opts.quality !== 'auto' && opts.quality !== 'original');

  if (needsTranscode) {
    params.set('Static', 'false');
    params.set('VideoCodec', 'h264');
    params.set('AudioCodec', 'aac,mp3');
    params.set('Container', 'ts');
    params.set('TranscodingContainer', 'ts');
    if (opts.audioIndex >= 0) params.set('AudioStreamIndex', opts.audioIndex);
    if (opts.subtitleIndex >= 0) {
      params.set('SubtitleStreamIndex', opts.subtitleIndex);
      params.set('SubtitleMethod', 'Encode');
    }
    if (opts.quality && opts.quality !== 'auto' && opts.quality !== 'original') {
      params.set('VideoBitRate', opts.quality);
    }
    // Add MediaSourceId for transcoding
    if (currentMediaSources[0]) {
      params.set('MediaSourceId', currentMediaSources[0].Id);
    }
  } else {
    // Direct play — serve the raw file
    params.set('Static', 'true');
  }

  return SERVER + '/Videos/' + playId + '/stream?' + params.toString();
}

/* ── Core stream loader with proper event sequencing ── */
function loadStream(seekTo) {
  if (!currentPlayId) return;

  showLoading(true);

  const opts = {};
  // Only add track params if user has explicitly changed them
  if (currentAudioIndex >= 0) opts.audioIndex = currentAudioIndex;
  if (currentSubIndex >= 0) opts.subtitleIndex = currentSubIndex;
  if (currentQuality && currentQuality !== 'auto') opts.quality = currentQuality;
  // If any track is set, force transcode
  if (currentAudioIndex >= 0 || currentSubIndex >= 0) opts.forceTranscode = true;

  const url = buildStreamUrl(currentPlayId, opts);

  // Clean up all listeners first
  video.onloadedmetadata = null;
  video.oncanplay = null;
  video.onerror = null;
  video.pause();

  // Set up event chain: loaded → seek → play
  video.onloadedmetadata = function() {
    video.onloadedmetadata = null;
    // Seek if needed
    if (seekTo && seekTo > 0 && isFinite(seekTo)) {
      video.currentTime = seekTo;
    }
    // Now wait for canplay (may fire immediately if already buffered enough)
    video.oncanplay = function() {
      video.oncanplay = null;
      showLoading(false);
      video.play().then(function() {
        isPlaying = true;
        updatePlayIcon();
        startProgressLoop();
      }).catch(function() {
        // Autoplay blocked — user needs to click play
        isPlaying = false;
        updatePlayIcon();
        showLoading(false);
      });
    };
  };

  // Error handler: if direct play fails, retry with transcoding
  video.onerror = function() {
    video.onerror = null;
    var errCode = video.error ? video.error.code : 0;
    console.log('Stream error (code ' + errCode + '). Retrying with transcoding...');

    // If we were already transcoding, give up
    if (opts.forceTranscode) {
      showLoading(false);
      console.error('Transcoded stream also failed.');
      return;
    }

    // Retry with forced transcoding
    opts.forceTranscode = true;
    var url2 = buildStreamUrl(currentPlayId, opts);

    video.onloadedmetadata = function() {
      video.onloadedmetadata = null;
      if (seekTo && seekTo > 0 && isFinite(seekTo)) video.currentTime = seekTo;
      video.oncanplay = function() {
        video.oncanplay = null;
        showLoading(false);
        video.play().then(function() { isPlaying = true; updatePlayIcon(); startProgressLoop(); }).catch(function() { isPlaying = false; updatePlayIcon(); showLoading(false); });
      };
    };
    video.onerror = function() {
      video.onerror = null;
      showLoading(false);
      console.error('All playback attempts failed.');
    };
    video.src = url2;
    video.load();
  };

  video.src = url;
  video.load();
  video.volume = volume;
  video.muted = isMuted;
}

/* ── Play item ── */
async function playItem(id, type) {
  let playId = id;
  if (type === 'Series') {
    try {
      const ss = await jfetch('/Shows/' + id + '/Seasons?UserId=' + USER_ID);
      if (ss.Items && ss.Items.length) {
        const eps = await jfetch('/Shows/' + id + '/Episodes?SeasonId=' + ss.Items[0].Id + '&UserId=' + USER_ID + '&Limit=1');
        if (eps.Items && eps.Items.length) playId = eps.Items[0].Id;
      }
    } catch(e) {}
  }

  currentPlayId = playId;
  currentAudioIndex = -1;
  currentSubIndex = -1;
  currentQuality = 'auto';

  // Fetch playback info
  try {
    const pb = await jfetch('/Items/' + playId + '/PlaybackInfo?UserId=' + USER_ID);
    currentMediaSources = pb.MediaSources || [];
    populateTrackPanels();
  } catch(e) { currentMediaSources = []; }

  // Get title info
  try {
    const item = await jfetch('/Users/' + USER_ID + '/Items/' + playId);
    document.getElementById('playerSeriesName').textContent = item.SeriesName || '';
    document.getElementById('playerEpTitle').textContent = item.Name || '';
  } catch(e) {}

  // Show player with animation
  pc.classList.add('active', 'entering', 'show-controls');
  playerActive = true;
  startLiquidAnimation();
  closeDetail();

  setTimeout(function() {
    pc.classList.remove('entering');
    loadStream(0);
    startControlsTimer();
  }, 800);
}

function closePlayer() {
  video.pause();
  video.onloadedmetadata = null;
  video.oncanplay = null;
  video.onerror = null;
  video.removeAttribute('src');
  video.load(); // reset
  pc.classList.remove('active', 'show-controls');
  isPlaying = false;
  playerActive = false;
  updatePlayIcon();
  cancelAnimationFrame(rafId);
  cancelAnimationFrame(liquidRafId);
  closeAllPanels();
  showLoading(false);
  document.body.style.overflow = '';
}

function togglePlay() {
  if (video.paused) {
    video.play().then(function() { isPlaying = true; updatePlayIcon(); startProgressLoop(); }).catch(function(e) { console.log('Play failed:', e); });
  } else {
    video.pause();
    isPlaying = false;
    updatePlayIcon();
  }
}
function updatePlayIcon() {
  document.getElementById('iconPlay').style.display = isPlaying ? 'none' : 'block';
  document.getElementById('iconPause').style.display = isPlaying ? 'block' : 'none';
}
function skip(s) { if (video.duration) video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + s)); }

/* ── Progress loop — throttled to 10fps for perf ── */
var lastProg = 0;
function startProgressLoop() {
  cancelAnimationFrame(rafId);
  function tick(ts) {
    if (ts - lastProg > 100) { // 10fps
      lastProg = ts;
      if (video.duration) {
        document.getElementById('progressBar').style.width = (video.currentTime / video.duration * 100) + '%';
        document.getElementById('timeCurrent').textContent = fmt(video.currentTime);
        document.getElementById('timeDuration').textContent = fmt(video.duration);
        if (video.buffered.length) {
          document.getElementById('progressBuffer').style.width = (video.buffered.end(video.buffered.length - 1) / video.duration * 100) + '%';
        }
      }
    }
    if (!video.paused) rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

// Video events
video.addEventListener('playing', function() { isPlaying = true; updatePlayIcon(); startProgressLoop(); showLoading(false); });
video.addEventListener('waiting', function() { showLoading(true); });
video.addEventListener('pause', function() { isPlaying = false; updatePlayIcon(); });

// Progress bar
var pw = document.getElementById('progressWrap');
pw.addEventListener('click', function(e) { if (!video.duration) return; var r = pw.getBoundingClientRect(); video.currentTime = ((e.clientX - r.left) / r.width) * video.duration; });
pw.addEventListener('mousemove', function(e) { if (!video.duration) return; var r = pw.getBoundingClientRect(); var tt = document.getElementById('progressTooltip'); tt.textContent = fmt(((e.clientX - r.left) / r.width) * video.duration); tt.style.left = (e.clientX - r.left) + 'px'; });
function fmt(s) { if (!s || !isFinite(s)) return '00:00'; var h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60); return (h ? h+':' : '') + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0'); }

// Volume
function toggleMute() { isMuted = !isMuted; video.muted = isMuted; }
document.getElementById('liquidVolumeWrap').addEventListener('click', function(e) {
  var r = e.currentTarget.getBoundingClientRect();
  volume = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  video.volume = volume; isMuted = false; video.muted = false;
});

// Liquid volume — ONLY runs when player is active
var lvCanvas = document.getElementById('liquidVolumeCanvas');
var lvCtx = lvCanvas.getContext('2d');
var liquidFrame = 0;
function drawLiquidVolume() {
  var w = lvCanvas.width, h = lvCanvas.height;
  var vol = isMuted ? 0 : volume;
  var fillW = vol * w;
  lvCtx.clearRect(0, 0, w, h);
  var trackY = h/2 - 3, trackH = 6;
  lvCtx.fillStyle = 'rgba(255,255,255,0.06)';
  lvCtx.beginPath(); lvCtx.roundRect(0, trackY, w, trackH, 3); lvCtx.fill();
  if (fillW < 1) return;
  lvCtx.save();
  lvCtx.beginPath(); lvCtx.roundRect(0, trackY - 6, fillW + 6, trackH + 12, 4); lvCtx.clip();
  var grad = lvCtx.createLinearGradient(0, 0, fillW, 0);
  grad.addColorStop(0, '#c8aa82'); grad.addColorStop(1, '#4a7dff');
  lvCtx.fillStyle = grad;
  lvCtx.beginPath(); lvCtx.moveTo(0, h);
  for (var x = 0; x <= fillW; x += 2) { // step by 2 for perf
    var wave = Math.sin(x * 0.08 + liquidFrame * 0.06) * 3 * vol + Math.sin(x * 0.04 + liquidFrame * 0.03) * 2 * vol;
    lvCtx.lineTo(x, h/2 - trackH + wave);
  }
  lvCtx.lineTo(fillW, h); lvCtx.closePath(); lvCtx.fill();
  lvCtx.globalAlpha = 0.3;
  lvCtx.beginPath();
  for (var x2 = 0; x2 <= fillW; x2 += 3) {
    var wave2 = Math.sin(x2 * 0.08 + liquidFrame * 0.06) * 3 * vol;
    if (x2 === 0) lvCtx.moveTo(x2, h/2 - trackH + wave2 - 1); else lvCtx.lineTo(x2, h/2 - trackH + wave2 - 1);
  }
  lvCtx.strokeStyle = 'rgba(255,255,255,0.6)'; lvCtx.lineWidth = 1; lvCtx.stroke();
  lvCtx.restore();
  lvCtx.beginPath(); lvCtx.arc(fillW, h/2, 5, 0, Math.PI * 2); lvCtx.fillStyle = '#fff'; lvCtx.fill();
  lvCtx.beginPath(); lvCtx.arc(fillW, h/2, 8, 0, Math.PI * 2); lvCtx.fillStyle = 'rgba(200,170,130,0.15)'; lvCtx.fill();
}
function startLiquidAnimation() {
  cancelAnimationFrame(liquidRafId);
  function tick() {
    if (!playerActive) return;
    liquidFrame++;
    drawLiquidVolume();
    liquidRafId = requestAnimationFrame(tick);
  }
  liquidRafId = requestAnimationFrame(tick);
}

// Fullscreen
function toggleFullscreen() { if (!document.fullscreenElement) pc.requestFullscreen().catch(function(){}); else document.exitFullscreen(); }

// Controls timer
function startControlsTimer() { clearTimeout(controlsTimeout); pc.classList.add('show-controls'); controlsTimeout = setTimeout(function() { if (isPlaying) { pc.classList.remove('show-controls'); closeAllPanels(); } }, 3500); }
pc.addEventListener('mousemove', startControlsTimer);
pc.addEventListener('click', function(e) { if (e.target === video) { togglePlay(); startControlsTimer(); } });

// Keyboard
document.addEventListener('keydown', function(e) {
  if (!pc.classList.contains('active')) return;
  if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowRight') skip(10);
  if (e.key === 'ArrowLeft') skip(-10);
  if (e.key === 'f') toggleFullscreen();
  if (e.key === 'Escape') closePlayer();
  if (e.key === 'm') toggleMute();
  if (e.key === 'ArrowUp') { e.preventDefault(); volume = Math.min(1, volume + .05); video.volume = volume; isMuted = false; video.muted = false; }
  if (e.key === 'ArrowDown') { e.preventDefault(); volume = Math.max(0, volume - .05); video.volume = volume; }
  startControlsTimer();
});

/* ── TRACK PANELS ── */
var openPanelName = null;
function togglePanel(name) {
  var panels = {audio: 'panelAudio', subs: 'panelSubs', quality: 'panelQuality'};
  if (openPanelName === name) { closeAllPanels(); return; }
  closeAllPanels();
  document.getElementById(panels[name]).classList.add('open');
  openPanelName = name;
  startControlsTimer();
}
function closeAllPanels() {
  document.querySelectorAll('.settings-panel').forEach(function(p) { p.classList.remove('open'); });
  openPanelName = null;
}

function populateTrackPanels() {
  var src = currentMediaSources[0];
  if (!src) return;
  var streams = src.MediaStreams || [];

  // Audio
  var audioStreams = streams.filter(function(s) { return s.Type === 'Audio'; });
  var al = document.getElementById('audioTrackList');
  if (audioStreams.length) {
    var defAudio = audioStreams.find(function(s) { return s.IsDefault; }) || audioStreams[0];
    al.innerHTML = audioStreams.map(function(s) {
      var label = s.DisplayTitle || s.Language || 'Track ' + (s.Index + 1);
      var meta = (s.Codec || '').toUpperCase() + (s.Channels ? ' · ' + s.Channels + 'ch' : '');
      return '<div class="panel-option' + (s.Index === defAudio.Index ? ' selected' : '') + '" onclick="event.stopPropagation();selectAudioTrack(' + s.Index + ',this)"><div class="opt-label">' + label + '</div><div class="opt-meta">' + meta + '</div></div>';
    }).join('');
    document.getElementById('audioTrackLabel').textContent = defAudio.DisplayTitle || defAudio.Language || 'Audio';
  } else {
    al.innerHTML = '<div class="panel-option" style="color:var(--text-muted)">No audio tracks</div>';
  }

  // Subtitles
  var subStreams = streams.filter(function(s) { return s.Type === 'Subtitle'; });
  var sl = document.getElementById('subTrackList');
  sl.innerHTML = '<div class="panel-option selected" onclick="event.stopPropagation();selectSubTrack(-1,this)"><div class="opt-label">Off</div></div>' +
    subStreams.map(function(s) {
      var label = s.DisplayTitle || s.Language || 'Subtitle ' + (s.Index + 1);
      var meta = (s.Codec || '') + (s.IsForced ? ' · Forced' : '');
      return '<div class="panel-option" onclick="event.stopPropagation();selectSubTrack(' + s.Index + ',this)"><div class="opt-label">' + label + '</div><div class="opt-meta">' + meta + '</div></div>';
    }).join('');

  // Quality
  var ql = document.getElementById('qualityList');
  var br = src.Bitrate;
  var qOpts = '<div class="panel-option selected" onclick="event.stopPropagation();selectQuality(\'auto\',this)"><div class="opt-label">Auto (Direct)</div></div>';
  if (br) {
    qOpts += '<div class="panel-option" onclick="event.stopPropagation();selectQuality(\'original\',this)"><div class="opt-label">Original</div><div class="opt-meta">' + Math.round(br/1000000) + ' Mbps</div></div>';
    if (br > 8000000) qOpts += '<div class="panel-option" onclick="event.stopPropagation();selectQuality(\'8000000\',this)"><div class="opt-label">1080p</div><div class="opt-meta">8 Mbps</div></div>';
    if (br > 4000000) qOpts += '<div class="panel-option" onclick="event.stopPropagation();selectQuality(\'4000000\',this)"><div class="opt-label">720p</div><div class="opt-meta">4 Mbps</div></div>';
    qOpts += '<div class="panel-option" onclick="event.stopPropagation();selectQuality(\'2000000\',this)"><div class="opt-label">480p</div><div class="opt-meta">2 Mbps</div></div>';
  }
  ql.innerHTML = qOpts;
}

function selectAudioTrack(idx, el) {
  if (idx === currentAudioIndex) { closeAllPanels(); return; }
  el.parentElement.querySelectorAll('.panel-option').forEach(function(o) { o.classList.remove('selected'); });
  el.classList.add('selected');
  currentAudioIndex = idx;
  document.getElementById('audioTrackLabel').textContent = el.querySelector('.opt-label').textContent;
  closeAllPanels();
  // Reload stream with new track, keeping position
  var pos = video.currentTime;
  loadStream(pos);
}

function selectSubTrack(idx, el) {
  el.parentElement.querySelectorAll('.panel-option').forEach(function(o) { o.classList.remove('selected'); });
  el.classList.add('selected');
  currentSubIndex = idx;
  closeAllPanels();
  // Reload stream with new subtitle track, keeping position
  var pos = video.currentTime;
  loadStream(pos);
}

function selectQuality(val, el) {
  el.parentElement.querySelectorAll('.panel-option').forEach(function(o) { o.classList.remove('selected'); });
  el.classList.add('selected');
  currentQuality = val;
  document.getElementById('qualityLabel').textContent = el.querySelector('.opt-label').textContent;
  closeAllPanels();
  var pos = video.currentTime;
  loadStream(pos);
}
</script>
